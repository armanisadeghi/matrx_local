name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            args: --target aarch64-apple-darwin --bundles app,updater
          - platform: macos-15
            args: --target x86_64-apple-darwin --bundles app,updater
          - platform: ubuntu-22.04
            args: --bundles deb
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # ---- Python sidecar build ----
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install Python dependencies
        run: uv sync --extra all

      - name: Build Python sidecar binary
        run: |
          chmod +x scripts/build-sidecar.sh
          if [[ "${{ matrix.args }}" == *"x86_64-apple-darwin"* ]]; then
            ./scripts/build-sidecar.sh --target x86_64-apple-darwin
          elif [[ "${{ matrix.args }}" == *"aarch64-apple-darwin"* ]]; then
            ./scripts/build-sidecar.sh --target aarch64-apple-darwin
          else
            ./scripts/build-sidecar.sh
          fi
        shell: bash

      - name: Download cloudflared sidecar binary
        run: |
          chmod +x scripts/download-cloudflared.sh
          if [[ "${{ matrix.args }}" == *"x86_64-apple-darwin"* ]]; then
            ./scripts/download-cloudflared.sh --target x86_64-apple-darwin
          elif [[ "${{ matrix.args }}" == *"aarch64-apple-darwin"* ]]; then
            ./scripts/download-cloudflared.sh --target aarch64-apple-darwin
          elif [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
            ./scripts/download-cloudflared.sh --target x86_64-unknown-linux-gnu
          elif [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            ./scripts/download-cloudflared.sh --target x86_64-pc-windows-msvc
          fi
        shell: bash

      # ---- Frontend + Tauri build ----
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-15' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 \
            tesseract-ocr tesseract-ocr-eng

      - name: Install macOS system dependencies
        if: matrix.platform == 'macos-15'
        run: brew install tesseract

      - name: Install Windows system dependencies
        if: matrix.platform == 'windows-latest'
        run: choco install tesseract -y
        shell: pwsh

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Supabase publishable keys — inlined by Vite at build time
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          # Scraper server URL — public, not a secret. All scraper API calls go here.
          # Authenticated users' Supabase JWTs are forwarded; no user-level API key needed.
          SCRAPER_SERVER_URL: "https://scraper.app.matrxserver.com"
          # macOS notarization (optional — only active when secrets are set)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tagName: v__VERSION__
          releaseName: "AI Matrx v__VERSION__"
          releaseBody: "See the assets below to download and install this version."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

