name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            args: --target aarch64-apple-darwin --bundles app,updater --features metal
          - platform: macos-15
            args: --target x86_64-apple-darwin --bundles app,updater --features metal
          - platform: ubuntu-22.04
            args: --bundles deb
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # ---- Python sidecar build ----
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install Python dependencies
        run: uv sync --extra transcription

      - name: Import Apple certificate for code signing
        if: matrix.platform == 'macos-15'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Decode certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate into keychain
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to use the certificate without prompting
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add temp keychain to the search list (prepend so it's found first)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "✅ Apple certificate imported into temporary keychain"

      - name: Build Python sidecar binary
        env:
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-15' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          # These are baked into the binary by scripts/write_bundled_config.py
          # (called inside build-sidecar.sh). All three are publishable/public values.
          AIDREAM_SERVER_URL_LIVE: ${{ secrets.AIDREAM_SERVER_URL_LIVE }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
        run: |
          chmod +x scripts/build-sidecar.sh
          if [[ "${{ matrix.args }}" == *"x86_64-apple-darwin"* ]]; then
            ./scripts/build-sidecar.sh --target x86_64-apple-darwin
          elif [[ "${{ matrix.args }}" == *"aarch64-apple-darwin"* ]]; then
            ./scripts/build-sidecar.sh --target aarch64-apple-darwin
          else
            ./scripts/build-sidecar.sh
          fi
        shell: bash

      - name: Download cloudflared sidecar binary
        run: |
          chmod +x scripts/download-cloudflared.sh
          if [[ "${{ matrix.args }}" == *"x86_64-apple-darwin"* ]]; then
            ./scripts/download-cloudflared.sh --target x86_64-apple-darwin
          elif [[ "${{ matrix.args }}" == *"aarch64-apple-darwin"* ]]; then
            ./scripts/download-cloudflared.sh --target aarch64-apple-darwin
          elif [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
            ./scripts/download-cloudflared.sh --target x86_64-unknown-linux-gnu
          elif [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            ./scripts/download-cloudflared.sh --target x86_64-pc-windows-msvc
          fi
        shell: bash

      - name: Download llama-server sidecar binary
        run: |
          chmod +x scripts/download-llama-server.sh
          if [[ "${{ matrix.args }}" == *"x86_64-apple-darwin"* ]]; then
            ./scripts/download-llama-server.sh --target x86_64-apple-darwin
          elif [[ "${{ matrix.args }}" == *"aarch64-apple-darwin"* ]]; then
            ./scripts/download-llama-server.sh --target aarch64-apple-darwin
          elif [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
            ./scripts/download-llama-server.sh --target x86_64-unknown-linux-gnu
          elif [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            ./scripts/download-llama-server.sh --target x86_64-pc-windows-msvc
          fi
        shell: bash

      # ---- Sign llama.cpp dylibs (macOS only) ----
      # Apple notarization requires every binary inside the app bundle to be
      # signed with a Developer ID certificate. The llama.cpp dylibs we download
      # from GitHub Releases are unsigned, so we must sign them here before
      # tauri-action bundles them via tauri.macos.conf.json resources.
      - name: Sign llama.cpp dylibs for notarization
        if: matrix.platform == 'macos-15'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          DYLIB_DIR="desktop/src-tauri/binaries"
          if ls "$DYLIB_DIR"/*.dylib 1>/dev/null 2>&1; then
            echo "Signing dylibs in $DYLIB_DIR with identity: $APPLE_SIGNING_IDENTITY"
            for dylib in "$DYLIB_DIR"/*.dylib; do
              echo "  Signing: $(basename "$dylib")"
              codesign \
                --force \
                --timestamp \
                --options runtime \
                --sign "$APPLE_SIGNING_IDENTITY" \
                "$dylib"
            done
            echo "✅ All dylibs signed"
          else
            echo "No dylibs found in $DYLIB_DIR — skipping dylib signing"
          fi

      # ---- Frontend + Tauri build ----
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-15' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 \
            tesseract-ocr tesseract-ocr-eng libasound2-dev cmake libgcc-12-dev

      - name: Install macOS system dependencies
        if: matrix.platform == 'macos-15'
        run: brew install tesseract

      - name: Install Windows system dependencies
        if: matrix.platform == 'windows-latest'
        run: |
          # cmake is required by whisper-cpp-plus-sys to compile whisper.cpp from source.
          # Explicitly install it (rather than relying on the VS2022 runner PATH) so the
          # build does not break if GitHub changes the runner image.
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          choco install tesseract -y
        shell: pwsh

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Supabase publishable keys — inlined by Vite at build time
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          # Scraper server URL — public, not a secret. All scraper API calls go here.
          # Authenticated users' Supabase JWTs are forwarded; no user-level API key needed.
          SCRAPER_SERVER_URL: "https://scraper.app.matrxserver.com"
          # macOS code signing
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # macOS notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tagName: v__VERSION__
          releaseName: "AI Matrx v__VERSION__"
          releaseBody: "See the assets below to download and install this version."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  # ── Rename assets to human-friendly names ──────────────────────────────────
  rename-assets:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Rename release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"

          echo "🏷  Tag: $TAG  Version: $VERSION"
          echo ""

          # Fetch asset list as JSON (id + name) in one API call
          ASSETS_JSON=$(gh api "repos/${REPO}/releases/tags/${TAG}" --jq '.assets[] | {id: .id, name: .name}' | jq -s '.')

          rename_asset() {
            local old="$1" new="$2"
            if [[ "$old" == "$new" ]]; then return; fi
            # Look up the asset ID by name
            local asset_id
            asset_id=$(echo "$ASSETS_JSON" | jq -r ".[] | select(.name == \"$old\") | .id")
            if [[ -z "$asset_id" ]]; then
              echo "  ⚠  Asset not found: $old (skipping)"
              return
            fi
            echo "  📦 $old → $new"
            # PATCH the asset name in-place — no download/upload needed
            gh api --method PATCH "repos/${REPO}/releases/assets/${asset_id}" \
              -f name="$new" --silent
          }

          for ASSET in $(echo "$ASSETS_JSON" | jq -r '.[].name'); do
            case "$ASSET" in
              # ── macOS Apple Silicon ──
              *_aarch64.app.tar.gz)
                rename_asset "$ASSET" "ai-matrx-mac-silicon-${VERSION}.app.tar.gz" ;;
              *_aarch64.app.tar.gz.sig)
                rename_asset "$ASSET" "ai-matrx-mac-silicon-${VERSION}.app.tar.gz.sig" ;;

              # ── macOS Intel ──
              *_x64.app.tar.gz)
                rename_asset "$ASSET" "ai-matrx-mac-intel-${VERSION}.app.tar.gz" ;;
              *_x64.app.tar.gz.sig)
                rename_asset "$ASSET" "ai-matrx-mac-intel-${VERSION}.app.tar.gz.sig" ;;

              # ── Linux ──
              *_amd64.deb)
                rename_asset "$ASSET" "ai-matrx-linux-${VERSION}.deb" ;;
              *_amd64.deb.sig)
                rename_asset "$ASSET" "ai-matrx-linux-${VERSION}.deb.sig" ;;

              # ── Windows installer (.exe / NSIS) ──
              *_x64-setup.exe)
                rename_asset "$ASSET" "ai-matrx-windows-installer-${VERSION}.exe" ;;
              *_x64-setup.exe.sig)
                rename_asset "$ASSET" "ai-matrx-windows-installer-${VERSION}.exe.sig" ;;

              # ── Windows MSI ──
              *_x64_en-US.msi)
                rename_asset "$ASSET" "ai-matrx-windows-${VERSION}.msi" ;;
              *_x64_en-US.msi.sig)
                rename_asset "$ASSET" "ai-matrx-windows-${VERSION}.msi.sig" ;;

              # ── NSIS zip bundle (if present) ──
              *_x64-setup.nsis.zip)
                rename_asset "$ASSET" "ai-matrx-windows-installer-${VERSION}.nsis.zip" ;;
              *_x64-setup.nsis.zip.sig)
                rename_asset "$ASSET" "ai-matrx-windows-installer-${VERSION}.nsis.zip.sig" ;;

              # ── Skip latest.json (patched in next step) ──
              latest.json)
                echo "  ⏭  Skipping $ASSET" ;;

              *)
                echo "  ⚠  Unknown asset pattern: $ASSET (left as-is)" ;;
            esac
          done

          echo ""
          echo "✅ Asset rename complete"

      - name: Patch latest.json URLs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          PREFIX="AI-Matrx_${VERSION}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          mkdir -p /tmp/updater
          gh release download "$TAG" --repo "$REPO" --pattern "latest.json" --dir /tmp/updater

          # Rebuild the URL for each platform key by mapping to the known renamed filename.
          # This is resilient to whatever Tauri named the original file — we only care about
          # the final renamed asset names (set in the "Rename release assets" step above).
          python3 << 'PYEOF'
          import json, os

          tag      = os.environ["TAG"]
          version  = os.environ["VERSION"]
          repo     = os.environ["REPO"]
          prefix   = f"AI-Matrx_{version}"
          base_url = f"https://github.com/{repo}/releases/download/{tag}"

          # Map: latest.json platform key -> renamed asset filename
          PLATFORM_ASSETS = {
              "darwin-aarch64":      f"ai-matrx-mac-silicon-{version}.app.tar.gz",
              "darwin-aarch64-app":  f"ai-matrx-mac-silicon-{version}.app.tar.gz",
              "darwin-x86_64":       f"ai-matrx-mac-intel-{version}.app.tar.gz",
              "darwin-x86_64-app":   f"ai-matrx-mac-intel-{version}.app.tar.gz",
              "linux-x86_64":        f"ai-matrx-linux-{version}.deb",
              "linux-x86_64-deb":    f"ai-matrx-linux-{version}.deb",
              "windows-x86_64":      f"ai-matrx-windows-{version}.msi",
              "windows-x86_64-msi":  f"ai-matrx-windows-{version}.msi",
              "windows-x86_64-nsis": f"ai-matrx-windows-installer-{version}.exe",
          }

          with open("/tmp/updater/latest.json") as f:
              data = json.load(f)

          patched = 0
          for key, entry in data.get("platforms", {}).items():
              if key in PLATFORM_ASSETS:
                  new_url = f"{base_url}/{PLATFORM_ASSETS[key]}"
                  if entry["url"] != new_url:
                      print(f"  🔗 {key}: {entry['url'].split('/')[-1]} → {PLATFORM_ASSETS[key]}")
                      entry["url"] = new_url
                      patched += 1

          with open("/tmp/updater/latest.json", "w") as f:
              json.dump(data, f, indent=2)

          print(f"\n✅ Patched {patched} URLs in latest.json")
          PYEOF

          echo ""
          echo "📝 Final latest.json:"
          cat /tmp/updater/latest.json

          # Re-upload
          gh release delete-asset "$TAG" --repo "$REPO" --yes "latest.json"
          gh release upload "$TAG" --repo "$REPO" /tmp/updater/latest.json

          echo ""
          echo "✅ latest.json updated"

      - name: Fill missing platforms from previous releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Expose shell variables as env vars so the Python heredoc can read them
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # All platform keys Tauri expects. If any are absent from the current
          # latest.json (because a platform build failed), we backfill them from
          # the most recent previous release that has those entries.
          # This ensures macOS users always get offered the last good macOS build
          # even when only Windows/Linux built successfully for the newest version.
          python3 << 'PYEOF'
          import json, os, subprocess, sys, urllib.request

          tag  = os.environ["TAG"]
          repo = os.environ["REPO"]
          gh_token = os.environ["GH_TOKEN"]

          EXPECTED_PLATFORMS = {
              "darwin-aarch64", "darwin-aarch64-app",
              "darwin-x86_64",  "darwin-x86_64-app",
              "linux-x86_64",   "linux-x86_64-deb",
              "windows-x86_64", "windows-x86_64-msi", "windows-x86_64-nsis",
          }

          def gh_get(path):
              url = f"https://api.github.com/repos/{repo}/{path}"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"Bearer {gh_token}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "release-workflow",
              })
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def fetch_latest_json(release_tag):
              url = f"https://github.com/{repo}/releases/download/{release_tag}/latest.json"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"Bearer {gh_token}",
                  "User-Agent": "release-workflow",
              })
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read())
              except Exception as e:
                  print(f"  Could not fetch latest.json for {release_tag}: {e}")
                  return None

          # Load the current release's latest.json (already patched by previous step)
          subprocess.run(
              ["gh", "release", "download", tag, "--repo", repo,
               "--pattern", "latest.json", "--dir", "/tmp/fill", "--clobber"],
              check=True
          )
          with open("/tmp/fill/latest.json") as f:
              current = json.load(f)

          missing = EXPECTED_PLATFORMS - set(current["platforms"].keys())
          if not missing:
              print(f"✅ All {len(EXPECTED_PLATFORMS)} platforms present — nothing to backfill.")
              sys.exit(0)

          print(f"⚠️  Missing platforms in {tag}: {missing}")
          print("Scanning previous releases for backfill candidates...")

          releases = gh_get("releases?per_page=30")
          # Skip the current release (first in list)
          for rel in releases:
              if rel["tag_name"] == tag:
                  continue
              if not missing:
                  break
              prev_json = fetch_latest_json(rel["tag_name"])
              if not prev_json:
                  continue
              covered = missing & set(prev_json["platforms"].keys())
              if not covered:
                  continue
              print(f"  📦 Backfilling from {rel['tag_name']}: {covered}")
              for key in covered:
                  current["platforms"][key] = prev_json["platforms"][key]
                  print(f"     {key} -> {prev_json['platforms'][key]['url']}")
              missing -= covered

          if missing:
              print(f"⚠️  Could not find backfill for: {missing} (no prior release has them)")
          else:
              print("✅ All missing platforms backfilled.")

          with open("/tmp/fill/latest.json", "w") as f:
              json.dump(current, f, indent=2)

          print("\n📝 Final latest.json:")
          print(json.dumps(current, indent=2))
          PYEOF

          # Re-upload the backfilled latest.json
          gh release delete-asset "$TAG" --repo "$REPO" --yes "latest.json" || true
          gh release upload "$TAG" --repo "$REPO" /tmp/fill/latest.json

          echo ""
          echo "✅ Backfilled latest.json uploaded"
