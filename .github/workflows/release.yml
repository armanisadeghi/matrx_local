name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            args: --target aarch64-apple-darwin --bundles app,updater
          - platform: macos-15
            args: --target x86_64-apple-darwin --bundles app,updater
          - platform: ubuntu-22.04
            args: --bundles deb
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # ---- Python sidecar build ----
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install Python dependencies
        run: uv sync --extra transcription

      - name: Import Apple certificate for code signing
        if: matrix.platform == 'macos-15'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Decode certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate into keychain
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to use the certificate without prompting
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add temp keychain to the search list (prepend so it's found first)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "✅ Apple certificate imported into temporary keychain"

      - name: Build Python sidecar binary
        env:
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-15' && secrets.APPLE_SIGNING_IDENTITY || '' }}
        run: |
          chmod +x scripts/build-sidecar.sh
          if [[ "${{ matrix.args }}" == *"x86_64-apple-darwin"* ]]; then
            ./scripts/build-sidecar.sh --target x86_64-apple-darwin
          elif [[ "${{ matrix.args }}" == *"aarch64-apple-darwin"* ]]; then
            ./scripts/build-sidecar.sh --target aarch64-apple-darwin
          else
            ./scripts/build-sidecar.sh
          fi
        shell: bash

      - name: Download cloudflared sidecar binary
        run: |
          chmod +x scripts/download-cloudflared.sh
          if [[ "${{ matrix.args }}" == *"x86_64-apple-darwin"* ]]; then
            ./scripts/download-cloudflared.sh --target x86_64-apple-darwin
          elif [[ "${{ matrix.args }}" == *"aarch64-apple-darwin"* ]]; then
            ./scripts/download-cloudflared.sh --target aarch64-apple-darwin
          elif [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
            ./scripts/download-cloudflared.sh --target x86_64-unknown-linux-gnu
          elif [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            ./scripts/download-cloudflared.sh --target x86_64-pc-windows-msvc
          fi
        shell: bash

      # ---- Frontend + Tauri build ----
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-15' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 \
            tesseract-ocr tesseract-ocr-eng libasound2-dev cmake

      - name: Install macOS system dependencies
        if: matrix.platform == 'macos-15'
        run: brew install tesseract

      - name: Install Windows system dependencies
        if: matrix.platform == 'windows-latest'
        run: choco install tesseract -y
        shell: pwsh

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Supabase publishable keys — inlined by Vite at build time
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          # Scraper server URL — public, not a secret. All scraper API calls go here.
          # Authenticated users' Supabase JWTs are forwarded; no user-level API key needed.
          SCRAPER_SERVER_URL: "https://scraper.app.matrxserver.com"
          # macOS code signing
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # macOS notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tagName: v__VERSION__
          releaseName: "AI Matrx v__VERSION__"
          releaseBody: "See the assets below to download and install this version."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  # ── Rename assets to human-friendly names ──────────────────────────────────
  rename-assets:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Rename release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          PREFIX="AI-Matrx_${VERSION}"

          echo "🏷  Tag: $TAG  Version: $VERSION"
          echo ""

          # Fetch current asset list
          ASSETS=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')

          rename_asset() {
            local old="$1" new="$2"
            if [[ "$old" == "$new" ]]; then return; fi
            echo "  📦 $old → $new"
            # Download, delete old, rename on disk, upload with new name
            gh release download "$TAG" --repo "$REPO" --pattern "$old" --dir /tmp/assets
            gh release delete-asset "$TAG" --repo "$REPO" --yes "$old"
            mv "/tmp/assets/$old" "/tmp/assets/$new"
            gh release upload "$TAG" --repo "$REPO" "/tmp/assets/$new"
          }

          mkdir -p /tmp/assets

          for ASSET in $ASSETS; do
            case "$ASSET" in
              # ── macOS Apple Silicon ──
              *_aarch64.app.tar.gz)
                rename_asset "$ASSET" "${PREFIX}_macOS-Apple-Silicon.app.tar.gz" ;;
              *_aarch64.app.tar.gz.sig)
                rename_asset "$ASSET" "${PREFIX}_macOS-Apple-Silicon.app.tar.gz.sig" ;;

              # ── macOS Intel ──
              *_x64.app.tar.gz)
                rename_asset "$ASSET" "${PREFIX}_macOS-Intel.app.tar.gz" ;;
              *_x64.app.tar.gz.sig)
                rename_asset "$ASSET" "${PREFIX}_macOS-Intel.app.tar.gz.sig" ;;

              # ── Linux ──
              *_amd64.deb)
                rename_asset "$ASSET" "${PREFIX}_Linux.deb" ;;
              *_amd64.deb.sig)
                rename_asset "$ASSET" "${PREFIX}_Linux.deb.sig" ;;

              # ── Windows Setup (.exe) ──
              *_x64-setup.exe)
                rename_asset "$ASSET" "${PREFIX}_Windows-Setup.exe" ;;
              *_x64-setup.exe.sig)
                rename_asset "$ASSET" "${PREFIX}_Windows-Setup.exe.sig" ;;

              # ── Windows Installer (.msi) ──
              *_x64_en-US.msi)
                rename_asset "$ASSET" "${PREFIX}_Windows.msi" ;;
              *_x64_en-US.msi.sig)
                rename_asset "$ASSET" "${PREFIX}_Windows.msi.sig" ;;

              # ── NSIS (.nsis.zip) if present ──
              *_x64-setup.nsis.zip)
                rename_asset "$ASSET" "${PREFIX}_Windows-Setup.nsis.zip" ;;
              *_x64-setup.nsis.zip.sig)
                rename_asset "$ASSET" "${PREFIX}_Windows-Setup.nsis.zip.sig" ;;

              # ── Skip latest.json / source archives ──
              latest.json|*.zip|*.tar.gz)
                echo "  ⏭  Skipping $ASSET" ;;

              *)
                echo "  ⚠  Unknown asset pattern: $ASSET (left as-is)" ;;
            esac
          done

          echo ""
          echo "✅ Asset rename complete"

      - name: Patch latest.json URLs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          PREFIX="AI-Matrx_${VERSION}"

          # Download latest.json
          gh release download "$TAG" --repo "$REPO" --pattern "latest.json" --dir /tmp/updater

          # Patch the URLs to match new asset names
          cd /tmp/updater
          sed -i \
            -e "s|AI\.Matrx_aarch64\.app\.tar\.gz|${PREFIX}_macOS-Apple-Silicon.app.tar.gz|g" \
            -e "s|AI\.Matrx_x64\.app\.tar\.gz|${PREFIX}_macOS-Intel.app.tar.gz|g" \
            -e "s|AI\.Matrx_${VERSION}_x64-setup\.nsis\.zip|${PREFIX}_Windows-Setup.nsis.zip|g" \
            -e "s|AI\.Matrx_${VERSION}_x64-setup\.exe|${PREFIX}_Windows-Setup.exe|g" \
            -e "s|AI\.Matrx_${VERSION}_amd64\.deb|${PREFIX}_Linux.deb|g" \
            latest.json

          echo "📝 Patched latest.json:"
          cat latest.json

          # Re-upload
          gh release delete-asset "$TAG" --repo "$REPO" --yes "latest.json"
          gh release upload "$TAG" --repo "$REPO" "latest.json"

          echo ""
          echo "✅ latest.json updated"
