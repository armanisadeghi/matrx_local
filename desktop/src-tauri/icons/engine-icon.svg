<?xml version="1.0" encoding="UTF-8"?>
<!--
  Matrx Engine icon  distinct from the main AI Matrx app icon.

  Design: same red / black / white brand palette, but a stacked-bar
  "server rack" / "engine block" motif so that on macOS Activity Monitor
  the user can tell at a glance which icon is the UI and which is the
  Python backend. Geometric and blocky to match the parent icon's style.

  The canonical raster outputs (PNG / ICNS / ICO) are generated from the
  Pillow-based script at scripts/generate-engine-icon.py  that script
  draws the same primitives natively (avoids an SVG-to-raster toolchain
  dep), but this SVG is the source of truth for visual edits.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Outer square: white background, same canvas as the parent app icon -->
  <rect x="0" y="0" width="512" height="512" fill="#ffffff"/>

  <!-- Heavy black border (matches parent icon's strong outline) -->
  <rect x="0" y="0" width="512" height="512" fill="none" stroke="#000000" stroke-width="32"/>

  <!-- Three stacked "server rack" bars, alternating red / black / red.
       Each bar carries two small white "status indicator" squares on the
       left side to read clearly as a server/engine box. -->

  <!-- Top bar (red) -->
  <rect x="56" y="80" width="400" height="96" fill="#e30613"/>
  <rect x="80" y="112" width="32" height="32" fill="#ffffff"/>
  <rect x="128" y="112" width="32" height="32" fill="#ffffff"/>

  <!-- Middle bar (black) -->
  <rect x="56" y="208" width="400" height="96" fill="#000000"/>
  <rect x="80" y="240" width="32" height="32" fill="#ffffff"/>
  <rect x="128" y="240" width="32" height="32" fill="#ffffff"/>

  <!-- Bottom bar (red) -->
  <rect x="56" y="336" width="400" height="96" fill="#e30613"/>
  <rect x="80" y="368" width="32" height="32" fill="#ffffff"/>
  <rect x="128" y="368" width="32" height="32" fill="#ffffff"/>
</svg>
